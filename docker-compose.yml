##############################################################################
# NeuSlice Printer Node — Docker Compose Stack
#
# Services:
#   - docker-socket-proxy : security layer — limits agent's Docker API access
#   - neuslice-agent      : NeuSlice marketplace bridge (always runs)
#   - watchtower          : automatic agent self-updates (always runs)
#   - bambuddy            : printer management UI — OPTIONAL
#                           Only starts when COMPOSE_PROFILES=bambuddy is set.
#                           Skip if you already have Bambuddy running separately.
#
# The installer sets COMPOSE_PROFILES automatically based on your answer
# to "Do you already have Bambuddy installed?"
#
# Quick start (installer handles this for you):
#   docker compose up -d                          # agent + watchtower only
#   COMPOSE_PROFILES=bambuddy docker compose up -d # agent + watchtower + bambuddy
##############################################################################

services:

  # ── Docker Socket Proxy (security: limits agent's Docker API access) ─────
  # The agent talks to this proxy instead of the raw Docker socket.
  # Only the API methods the agent actually needs are permitted — everything
  # else (exec, volumes, networks, swarm, secrets) is denied.
  docker-socket-proxy:
    image: tecnativa/docker-socket-proxy:0.2.0
    container_name: docker-socket-proxy
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      CONTAINERS: 1
      POST:       1
      IMAGES:     1
      AUTH:         0
      SECRETS:      0
      NETWORKS:     0
      VOLUMES:      0
      EXEC:         0
      SWARM:        0
      TASKS:        0
      SERVICES:     0
      CONFIGS:      0
      DISTRIBUTION: 0
      SESSION:      0
      SYSTEM:       0
      BUILD:        0
      COMMIT:       0
      NODES:        0
      PLUGINS:      0
    networks:
      - socket_proxy_net
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

  # ── Bambuddy (optional) ───────────────────────────────────────────────────
  # Only starts when COMPOSE_PROFILES=bambuddy (set by installer).
  # If you already have Bambuddy running, set BAMBUDDY_BASE_URL in .env
  # to point to it (e.g. http://192.168.1.50:8000) and skip this service.
  bambuddy:
    profiles: [bambuddy]
    image: maziggy/bambuddy:0.2.4.9
    container_name: bambuddy
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - bambuddy_data:/data
    environment:
      TZ: ${TZ:-America/New_York}
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    networks:
      - neuslice_net

  # ── NeuSlice Agent ────────────────────────────────────────────────────────
  neuslice-agent:
    image: medwiz159/neuslice:latest
    container_name: neuslice-agent
    restart: unless-stopped
    depends_on:
      watchtower:
        condition: service_started
      docker-socket-proxy:
        condition: service_started
    env_file:
      - .env
    environment:
      NODE_ENV: production
      WATCHTOWER_HTTP_API_TOKEN: ${WATCHTOWER_HTTP_API_TOKEN:-}
      WATCHTOWER_HOST: watchtower
      WATCHTOWER_PORT: "8080"
      DOCKER_SOCKET: tcp://docker-socket-proxy:2375
      NEUSLICE_PROJECT_DIR: /neuslice-project
    volumes:
      - .:/neuslice-project
    labels:
      com.centurylinklabs.watchtower.scope: neuslice
      com.centurylinklabs.watchtower.enable: "true"
    networks:
      - neuslice_net
      - socket_proxy_net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ── Watchtower trigger — fires an immediate update check on stack startup ──
  watchtower-trigger:
    image: curlimages/curl:8.7.1
    container_name: watchtower-trigger
    restart: "no"
    depends_on:
      - watchtower
    networks:
      - neuslice_net
    entrypoint: >
      sh -c "sleep 5 && curl -sf -X POST http://watchtower:8080/v1/update
      -H 'Authorization: Bearer ${WATCHTOWER_HTTP_API_TOKEN}' && echo 'Watchtower initial update triggered'"

  # ── Watchtower ────────────────────────────────────────────────────────────
  watchtower:
    image: containrrr/watchtower:1.7.1
    container_name: watchtower
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      WATCHTOWER_HTTP_API_UPDATE: "true"
      WATCHTOWER_HTTP_API_PERIODIC_POLLS: "true"
      WATCHTOWER_POLL_INTERVAL: "300"
      WATCHTOWER_SCOPE: neuslice
      WATCHTOWER_LABEL_ENABLE: "true"
      WATCHTOWER_CLEANUP: "true"
      WATCHTOWER_LOG_LEVEL: info
      DOCKER_API_VERSION: "1.45"
    ports:
      - "127.0.0.1:8080:8080"
    networks:
      - neuslice_net
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

# ── Volumes ───────────────────────────────────────────────────────────────────
volumes:
  bambuddy_data:

# ── Networks ──────────────────────────────────────────────────────────────────
networks:
  neuslice_net:
    driver: bridge
  socket_proxy_net:
    driver: bridge
    internal: true
