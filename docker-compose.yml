##############################################################################
# NeuSlice Printer Node — Docker Compose Stack
#
# This is the complete stack a printer owner runs on their home machine/NAS/Pi.
# It includes:
#   - bambuddy       : printer management, MQTT bridge, file queue, web UI
#   - neuslice-agent : the NeuSlice marketplace bridge
#   - watchtower     : automatic agent self-updates (no action required)
#
# Quick start:
#   cp .env.example .env      # fill in your values
#   docker compose up -d
#   open http://localhost:8000 # Bambuddy UI — add your printer here
##############################################################################

services:

  # ── Bambuddy ────────────────────────────────────────────────────────────────
  bambuddy:
    image: maziggy/bambuddy:latest
    container_name: bambuddy
    restart: unless-stopped
    ports:
      - "8000:8000"     # Bambuddy web UI + REST API
      # Virtual Printer ports (if you enable Virtual Printer in Bambuddy UI):
      # - "2883:2883"   # MQTT (virtual printer)
      # - "990:990"     # FTPS (virtual printer)
    volumes:
      - bambuddy_data:/data
    environment:
      # Set a timezone so schedules and timestamps are correct
      TZ: ${TZ:-America/New_York}
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    networks:
      - neuslice_net

  # ── NeuSlice Agent ─────────────────────────────────────────────────────────
  neuslice-agent:
    image: medwiz159/neuslice:latest    # published by NeuSlice CI
    # build: .                            # OR build locally during development
    container_name: neuslice-agent
    restart: unless-stopped
    depends_on:
      bambuddy:
        condition: service_healthy
      watchtower:
        condition: service_started
    env_file:
      - .env
    environment:
      # Override Bambuddy URL to use Docker service name (not localhost)
      BAMBUDDY_BASE_URL: http://bambuddy:8000
      NODE_ENV: production
      # Token file path — written by entrypoint.sh on first boot,
      # read by Watchtower from the same shared volume.
      WATCHTOWER_TOKEN_FILE: /run/neuslice/watchtower_token
      WATCHTOWER_PORT: "8080"
    volumes:
      - watchtower_token:/run/neuslice   # shared with Watchtower
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:9100/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - neuslice_net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ── Watchtower ──────────────────────────────────────────────────────────────
  # Watches for updated Docker images and restarts neuslice-agent automatically.
  # Runs in HTTP API mode only — no polling, no Docker Hub hammering.
  #
  # Update flow (no firewall rules needed):
  #   CI pushes new image to Docker Hub
  #     → calls POST /internal/trigger-update on the NeuSlice backend
  #     → backend sends UPDATE_AVAILABLE over the existing WebSocket to each agent
  #     → agent calls http://localhost:8080/v1/update (loopback, never leaves machine)
  #     → Watchtower pulls the new image and restarts the container
  #
  # The token is auto-generated by the agent on first boot and written to the
  # shared 'watchtower_token' volume. Watchtower reads it from the same path.
  # No manual token management needed.
  watchtower:
    image: containrrr/watchtower:latest
    container_name: watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - watchtower_token:/run/neuslice   # shared with neuslice-agent
    environment:
      # HTTP API mode: only update when the agent calls /v1/update on loopback.
      WATCHTOWER_HTTP_API_UPDATE: "true"
      # Read the token from the shared volume written by the agent entrypoint.
      # Watchtower will wait until the file exists before accepting requests.
      WATCHTOWER_HTTP_API_TOKEN_FILE: /run/neuslice/watchtower_token
      # Only watch the agent container.
      WATCHTOWER_SCOPE: neuslice-agent
      # Remove old image layers after a successful update.
      WATCHTOWER_CLEANUP: "true"
      WATCHTOWER_LOG_LEVEL: info
    # Bind to loopback only — the agent calls this on localhost.
    ports:
      - "127.0.0.1:8080:8080"
    networks:
      - neuslice_net
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

# ── Volumes ──────────────────────────────────────────────────────────────────
volumes:
  # Shared between neuslice-agent and watchtower for the auto-generated API token.
  # Persists across restarts so Watchtower keeps the same token after the agent
  # is updated (avoiding a chicken-and-egg problem on first post-update boot).
  watchtower_token:

  bambuddy_data:
    # Persists Bambuddy database, print archives, thumbnails, and profiles

# ── Network ──────────────────────────────────────────────────────────────────
networks:
  neuslice_net:
    driver: bridge
