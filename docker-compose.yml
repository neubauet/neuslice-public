##############################################################################
# NeuSlice Printer Node — Docker Compose Stack
#
# Services:
#   - neuslice-agent : NeuSlice marketplace bridge (always runs)
#   - watchtower     : automatic agent self-updates (always runs)
#   - bambuddy       : printer management UI — OPTIONAL
#                      Only starts when COMPOSE_PROFILES=bambuddy is set.
#                      Skip if you already have Bambuddy running separately.
#
# The installer sets COMPOSE_PROFILES automatically based on your answer
# to "Do you already have Bambuddy installed?"
#
# Quick start (installer handles this for you):
#   docker compose up -d                          # agent + watchtower only
#   COMPOSE_PROFILES=bambuddy docker compose up -d # agent + watchtower + bambuddy
##############################################################################

services:

  # ── Bambuddy (optional) ───────────────────────────────────────────────────
  # Only starts when COMPOSE_PROFILES=bambuddy (set by installer).
  # If you already have Bambuddy running, set BAMBUDDY_BASE_URL in .env
  # to point to it (e.g. http://192.168.1.50:8000) and skip this service.
  bambuddy:
    profiles: [bambuddy]
    image: maziggy/bambuddy:latest
    container_name: bambuddy
    restart: unless-stopped
    ports:
      - "8000:8000"     # Bambuddy web UI + REST API
    volumes:
      - bambuddy_data:/data
    environment:
      TZ: ${TZ:-America/New_York}
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    networks:
      - neuslice_net

  # ── NeuSlice Agent ────────────────────────────────────────────────────────
  neuslice-agent:
    image: medwiz159/neuslice:latest
    container_name: neuslice-agent
    restart: unless-stopped
    depends_on:
      watchtower:
        condition: service_started
    env_file:
      - .env
    environment:
      NODE_ENV: production
      WATCHTOWER_HTTP_API_TOKEN: ${WATCHTOWER_TOKEN}
      WATCHTOWER_PORT: "8080"
    networks:
      - neuslice_net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ── Watchtower ────────────────────────────────────────────────────────────
  # Handles automatic agent updates. No firewall rules needed — updates
  # arrive over the agent's existing outbound WebSocket connection.
  watchtower:
    image: containrrr/watchtower:1.7.1
    container_name: watchtower
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      WATCHTOWER_HTTP_API_UPDATE: "true"
      WATCHTOWER_HTTP_API_TOKEN: ${WATCHTOWER_TOKEN}
      WATCHTOWER_SCOPE: neuslice-agent
      WATCHTOWER_CLEANUP: "true"
      WATCHTOWER_LOG_LEVEL: info
      DOCKER_API_VERSION: "1.45"
    ports:
      - "127.0.0.1:8080:8080"
    networks:
      - neuslice_net
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

# ── Volumes ───────────────────────────────────────────────────────────────
volumes:
  bambuddy_data:

# ── Network ───────────────────────────────────────────────────────────────
networks:
  neuslice_net:
    driver: bridge
